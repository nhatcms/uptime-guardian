server {
    listen 3000;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Single-page app: route unknown paths back to index.html so the
    # vue-router history mode (e.g. /monitors/:id) works on direct load.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
